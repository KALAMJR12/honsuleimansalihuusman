kind = "web"
previewPath = "/"
title = "Suleiman Salihu Usman — Official Website"
version = "1.0.0"
id = "artifacts/suleiman-website"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19227

[services.development]
run = "npm run dev"

[services.production]
build = [ "npm", "run", "build" ]
serve = "static"
publicDir = "dist"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19227"
BASE_PATH = "/"
